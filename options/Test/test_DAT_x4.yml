# general settings
name: test_DAT_x4
model_type: DATModel
scale: 4
num_gpu: 1
manual_seed: 10

datasets:
  test_1:
    task: SR
    name: aiver_x4
    type: PairedImageDataset
    dataroot_gt: datasets/sr_dataset_aiver_x4/GT
    dataroot_lq: datasets/sr_dataset_aiver_x4/LQ_x4
    filename_tmpl: '{}'
    io_backend:
      type: disk


# network structures
network_g:
  type: DAT
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  split_size: [8,32]
  depth: [6,6,6,6,6,6]
  embed_dim: 180
  num_heads: [6,6,6,6,6,6]
  expansion_factor: 4
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: experiments/pretrained_models/DAT_x4.pth
  strict_load_g: True

# validation settings
val:
  save_img: True
  suffix: ~  # add suffix to saved images, if None, use exp name
  use_chop: False  # True to save memory, if img too large

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: True
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: True
